# Firework Performance Configuration

[build]
# Use native CPU features for maximum performance
# This will make the binary work only on the CPU it was built on
# For portable binaries, remove this line
rustflags = [
    "-C", "target-cpu=native",
    "-C", "link-arg=-fuse-ld=lld",  # Use LLD linker (faster)
]

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "target-cpu=native",
    "-C", "link-arg=-fuse-ld=lld",
]

# For Profile-Guided Optimization (PGO)
# Uncomment these when doing PGO builds:
# [target.x86_64-unknown-linux-gnu]
# rustflags = [
#     "-C", "profile-generate=/tmp/pgo-data",
# ]

# After generating profile data, use:
# [target.x86_64-unknown-linux-gnu]
# rustflags = [
#     "-C", "profile-use=/tmp/pgo-data/merged.profdata",
#     "-C", "llvm-args=-pgo-warn-missing-function",
# ]
